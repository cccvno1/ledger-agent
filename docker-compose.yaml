services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
    volumes:
      - ./configs:/app/configs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
